<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title data-i18n="libraryTitle">مكتبة الأذكار — سكينة</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../options/options.css">
  <style>
    .library-page { max-width: 1000px; margin: 0 auto; padding: 20px; }
    
    .search-filter-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 280px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 12px 16px;
      padding-inline-start: 40px;
      border: 1px solid #e1ddcd;
      border-radius: 10px;
      font-size: 15px;
      background: #fff;
      transition: all 0.2s;
    }

    .search-box input:focus {
      outline: none;
      border-color: #2d6a4f;
      box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.1);
    }

    .search-icon {
      position: absolute;
      top: 50%;
      inset-inline-start: 14px;
      transform: translateY(-50%);
      color: #8a8975;
      font-size: 18px;
    }

    .category-filter {
      padding: 10px 16px;
      border: 1px solid #e1ddcd;
      border-radius: 10px;
      background: #fff;
      font-size: 14px;
      color: #1a2e1f;
      cursor: pointer;
    }

    .azkar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .zikr-card {
      background: #fff;
      border: 1px solid #e8e4d7;
      border-radius: 14px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }

    .zikr-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px -8px rgba(0,0,0,0.1);
    }

    .zikr-text {
      font-family: "Amiri", serif;
      font-size: 1.3rem;
      line-height: 1.6;
      color: #1a4d2e;
      text-align: center;
    }

    .zikr-en {
      font-size: 0.95rem;
      color: #6b7569;
      text-align: center;
      font-style: italic;
      border-top: 1px solid #f0eee4;
      padding-top: 12px;
      direction: ltr;
    }

    .zikr-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 12px;
    }

    .category-tag {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      background: #f0eee4;
      color: #8a8975;
      padding: 4px 8px;
      border-radius: 6px;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: #8a8975;
    }

    .empty-state i { font-size: 40px; display: block; margin-bottom: 10px; }

    /* RTL specific overrides for search icon */
    [dir="rtl"] .search-icon { transform: translateY(-50%) scaleX(-1); }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .modal-overlay[hidden] {
      display: none !important;
    }
    .modal-card {
      background: #fff;
      width: 100%;
      max-width: 500px;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .modal-card h3 { color: #1a4d2e; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px; }
    .form-group label { font-size: 13px; font-weight: 600; color: #6b7569; }
    .form-group textarea, .form-group select {
      padding: 10px;
      border: 1px solid #e1ddcd;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
    }
    .form-row { display: flex; gap: 16px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
    
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      font-size: 14px;
      transition: all 0.2s;
    }
    .btn-primary { background: #2d6a4f; color: #fff; }
    .btn-primary:hover { background: #1a4d2e; }
    .btn-secondary { background: #f0eee4; color: #1a2e1f; }
    .btn-secondary:hover { background: #e1ddcd; }
    
    .zikr-actions {
      display: flex;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .zikr-card:hover .zikr-actions { opacity: 1; }
    .action-btn {
      background: #f0eee4;
      border: none;
      padding: 6px;
      border-radius: 6px;
      cursor: pointer;
      color: #8a8975;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .action-btn:hover { background: #e1ddcd; color: #1a2e1f; }
    
    .custom-badge {
      background: #e9f5ee;
      color: #2d6a4f;
      font-size: 10px;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      margin-inline-start: 8px;
    }
  </style>
</head>
<body>
  <div class="library-page">
    <header class="page-header">
      <div class="brand">
        <div class="logo-mark" data-i18n="logoMark">س</div>
        <div>
          <h1 data-i18n="libraryTitle">مكتبة الأذكار</h1>
          <p data-i18n="librarySubtitle">استكشف جميع الأذكار والأدعية في سكينة</p>
        </div>
      </div>
      <div class="header-actions">
        <button id="addZikrBtn" class="reset-btn" style="background: #2d6a4f; color: white;" data-i18n="addNewZikr">إضافة ذكر جديد</button>
        <a href="../options/options.html" class="reset-btn" data-i18n="backToOptions">العودة</a>
      </div>
    </header>

    <div class="search-filter-bar">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="ابحث في الأذكار..." data-i18n-attr="placeholder" data-i18n="searchPlaceholder">
      </div>
      <select id="categoryFilter" class="category-filter">
        <option value="all" data-i18n="allCategories">جميع التصنيفات</option>
        <option value="custom" data-i18n="customCategoryFilter">أذكاري المخصصة</option>
      </select>
    </div>

    <div id="azkarGrid" class="azkar-grid">
      <!-- Generated by library.js -->
      <div class="empty-state">
        <p data-i18n="loading">جاري التحميل...</p>
      </div>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div id="zikrModal" class="modal-overlay" hidden>
    <div class="modal-card">
      <h3 id="modalTitle" data-i18n="addZikrTitle">إضافة ذكر جديد</h3>
      <div class="modal-body">
        <div class="form-group">
          <label data-i18n="zikrTextLabel">نص الذكر (بالعربية)</label>
          <textarea id="modalZikrText" rows="3" placeholder="أدخل نص الذكر هنا..."></textarea>
        </div>
        <div class="form-group">
          <label data-i18n="zikrEnLabel">الترجمة الإنجليزية (اختياري)</label>
          <textarea id="modalZikrEn" rows="2" placeholder="English translation..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group" style="flex: 1;">
            <label data-i18n="category">التصنيف</label>
            <select id="modalCategory"></select>
          </div>
          <div class="form-group" style="width: 100px;">
            <label data-i18n="weight">التكرار</label>
            <select id="modalWeight">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3" selected>3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="cancelModal" class="btn btn-secondary" data-i18n="cancel">إلغاء</button>
        <button id="saveZikr" class="btn btn-primary" data-i18n="save">حفظ</button>
      </div>
    </div>
  </div>

  <script src="../scripts/i18n.js"></script>
  <script src="library.js" type="module"></script>
</body>
</html>
